
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My Idol Gallery ✨</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #dbdbdb;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .instagram-container {
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
        }
        .post {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            margin-bottom: 24px;
            border-radius: 3px;
        }
        .post-header {
            display: flex;
            align-items: center;
            padding: 14px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background-color: #bbb;
            border-radius: 50%;
            margin-right: 10px;
        }
        .username {
            font-weight: 600;
            font-size: 14px;
        }
        .post-img {
            width: 100%;
            display: block;
        }
        .post-body {
            padding: 12px 14px;
        }
        .actions {
            font-size: 24px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .likes {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .caption {
            font-size: 14px;
            line-height: 1.5;
        }
        .date {
            color: #8e8e8e;
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>✨ 給我最愛的偶像 ✨</header>

    <div class="instagram-container">
        
    <div class="post">
        <div class="post-header">
            <div class="avatar"></div>
            <div class="username">idol_fan_page</div>
        </div>
        <img class="post-img" src="images/idol1.jpg" alt="Idol Photo">
        <div class="post-body">
            <div class="actions" onclick="toggleLike(this)">❤️</div>
            <div class="likes">9,527 次讚</div>
            <div class="caption">
                <span class="username">idol_fan_page</span> 🌟 今天的舞台太完美了！閃閃發光的你就是我的動力。#應援 #舞台直拍
            </div>
            <div class="date">1天前</div>
        </div>
    </div>
    
    <div class="post">
        <div class="post-header">
            <div class="avatar"></div>
            <div class="username">idol_fan_page</div>
        </div>
        <img class="post-img" src="images/idol2.jpg" alt="Idol Photo">
        <div class="post-body">
            <div class="actions" onclick="toggleLike(this)">❤️</div>
            <div class="likes">13,140 次讚</div>
            <div class="caption">
                <span class="username">idol_fan_page</span> 📸 幕後花絮也這麼好看是合理的嗎？祝新專輯大賣！❤️
            </div>
            <div class="date">3天前</div>
        </div>
    </div>
    
    <div class="post">
        <div class="post-header">
            <div class="avatar"></div>
            <div class="username">idol_fan_page</div>
        </div>
        <img class="post-img" src="images/idol3.jpg" alt="Idol Photo">
        <div class="post-body">
            <div class="actions" onclick="toggleLike(this)">❤️</div>
            <div class="likes">52,013 次讚</div>
            <div class="caption">
                <span class="username">idol_fan_page</span> 🎂 祝我最愛的偶像生日快樂！願你天天開心，健康平安。#HappyIdolDay
            </div>
            <div class="date">2026年3月20日</div>
        </div>
    </div>
    
    </div>

    <script>
        function toggleLike(element) {
            if (element.innerText === "❤️") {
                element.innerText = "🤍";
            } else {
                element.innerText = "❤️";
            }
        }
    </script>
</body>
</html>
